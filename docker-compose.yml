version: '3.9'

services:

  postgres:

    image: postgres:16

    container_name: postgres_lotes

    environment:
      POSTGRES_DB: lotes_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:

    build:
      context: ./backend

    container_name: backend_lotes

    depends_on:
      - postgres

    ports:
      - "8080:8080"

  frontend:

    build:
      context: ./frontend

    container_name: frontend_lotes

    depends_on:
      - backend

    ports:
      - "4200:80"

volumes:
  postgres_data: